<!-- CAMBIOS CLAVE:
1. Mejora visual (tipografía, sombras, spacing)
2. Eliminado botón "Enviar" → envío automático al entrar al paso 3
3. Pantalla final con contador + redirección simulada
-->

<style>
  body { font-family: system-ui, -apple-system, sans-serif; background:#f7f7fb; }
  .form-wrap { max-width: 520px; margin: 3rem auto; padding: 1.5rem; background:white; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,0.08); }
  .step { display:none; }
  .step.active { display:block; }
  .btn-primary { width:100%; padding:14px; background:#6C63FF; color:white; border:none; border-radius:10px; cursor:pointer; font-size:15px; }
  .btn-primary:hover { opacity:.9; }
  input { padding:12px; border-radius:10px; border:1px solid #ddd; }
  .countdown { font-size:28px; font-weight:600; margin-top:10px; }
</style>

<div class="form-wrap">

  <!-- STEP 1 -->
  <div class="step active" id="s1">
    <p><b>Nombre completo</b></p>
    <input type="text" id="nombre" oninput="actualizarEmail()" />
    <p><b>Email</b></p>
    <input type="email" id="email" />
    <button class="btn-primary" onclick="irA2()" id="btn1" disabled>Continuar</button>
  </div>

  <!-- STEP 2 -->
  <div class="step" id="s2">
    <p><b>Área</b></p>
    <button onclick="selArea('Mantenimiento General')">Mantenimiento</button>
    <button onclick="selArea('Eléctrico')">Eléctrico</button>
    <button class="btn-primary" onclick="irA3()" id="btn2" disabled>Continuar</button>
  </div>

  <!-- STEP 3 -->
  <div class="step" id="s3">
    <p>Enviando email automáticamente...</p>
    <div id="status"></div>
  </div>

  <!-- STEP 4 -->
  <div class="step" id="s4">
    <p><b>Dirigiendo a Play Store</b></p>
    <p>Aquí vas a poder descargar la aplicación</p>
    <div class="countdown" id="count">5</div>
  </div>

</div>

<script>
let areaSeleccionada='';

function actualizarEmail(){
  const val=document.getElementById('nombre').value.trim();
  const parts=val.split(' ');
  if(parts.length>=2){
    document.getElementById('email').value = parts[0][0].toLowerCase()+parts[1].toLowerCase()+'@avpuertos.com';
    document.getElementById('btn1').disabled=false;
  }
}

function selArea(a){
  areaSeleccionada=a;
  document.getElementById('btn2').disabled=false;
}

function irA(n){
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
  document.getElementById('s'+n).classList.add('active');
}

function irA2(){ irA(2); }

function irA3(){
  irA(3);
  enviarEmail(); // AUTO ENVÍO
}

async function enviarEmail(){
  const status=document.getElementById('status');

  try{
    await new Promise(r=>setTimeout(r,1500)); // simulación
    status.textContent='Email enviado correctamente';
    setTimeout(()=>{
      irA(4);
      iniciarCountdown();
    },1000);
  }catch(e){
    status.textContent='Error';
  }
}

function iniciarCountdown(){
  let c=5;
  const el=document.getElementById('count');
  const interval=setInterval(()=>{
    c--;
    el.textContent=c;
    if(c===0){
      clearInterval(interval);
      window.location.href='https://play.google.com/store/apps/details?id=x1Trackmaster.x1Trackmaster&hl=es';
    }
  },1000);
}
</script>
