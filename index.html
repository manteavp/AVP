<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Formulario</title>
<style>
  body { font-family: system-ui; background:#f5f6fa; }
  .form-wrap { max-width:500px; margin:40px auto; background:#fff; padding:20px; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.08);} 
  input, button { width:100%; padding:12px; margin-top:10px; border-radius:8px; border:1px solid #ddd; }
  button { background:#e5e7eb; color:#111; border:none; cursor:pointer; }
  .area-btn { margin-top:10px; }
  .area-btn.selected { background:#2563eb; color:white; }
  .step{display:none;} .active{display:block;}
  .count{font-size:28px;font-weight:bold;text-align:center;margin-top:10px;}
</style>
</head>
<body>

<div class="form-wrap">

<div id="s1" class="step active">
  <p>Nombre</p>
  <input id="nombre" oninput="check()">
  <p>Apellido</p>
  <input id="apellido" oninput="check()">
  <p>Email</p>
  <input id="email">
  <button onclick="irA(2)" id="btn1" disabled>Continuar</button>
</div>

<div id="s2" class="step">
  <p>Área</p>
  <button class="area-btn" id="btn-mant" onclick="sel('Mantenimiento')">Mantenimiento</button>
  <button class="area-btn" id="btn-elec" onclick="sel('Eléctrico')">Eléctrico</button>
  
</div>

<div id="s3" class="step">
  <p><b>Dirigiendo a Play Store</b></p>
  <p>Aquí vas a poder descargar la aplicación</p>
  <div class="count" id="count">5</div>
</div>

</div>

<script>
let area='';

function check(){
  const n=document.getElementById('nombre').value;
  const a=document.getElementById('apellido').value;

  if(n && a){
    document.getElementById('email').value = n[0].toLowerCase()+a.toLowerCase()+'@avpuertos.com';
    document.getElementById('btn1').disabled=false;
  }
}

function irA(n){
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
  document.getElementById('s'+n).classList.add('active');
}

function sel(a){
  area=a;

  document.getElementById('btn-mant').classList.remove('selected');
  document.getElementById('btn-elec').classList.remove('selected');

  if(a==='Mantenimiento') document.getElementById('btn-mant').classList.add('selected');
  if(a==='Eléctrico') document.getElementById('btn-elec').classList.add('selected');

  setTimeout(()=>enviar(),300);
}

  const nombre=document.getElementById('nombre').value;
  const apellido=document.getElementById('apellido').value;
  const email=document.getElementById('email').value;

  await fetch("https://script.google.com/macros/s/AKfycby70IiiSG3uzteaBB39wZKbnSL_JNRxmMVu7PuhGXxMl1z5hsX7gh96p5F4kGuOf2yHbw/exec",{
    method:"POST",
    body: JSON.stringify({
      nombre,
      apellido,
      email,
      area
    })
  });

  irA(3);
  countdown();

  const body=`Nombre: ${nombre}\nApellido: ${apellido}\nEmail: ${email}\nÁrea: ${area}`;

  let c=5;
  const el=document.getElementById('count');

</script>

</body>
</html>
